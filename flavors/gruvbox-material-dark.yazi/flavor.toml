"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

[mgr]

cwd = { fg = "cyan" }

find_keyword = { fg = "yellow" }
find_position = { fg = "yellow", reversed = true }

marker_copied = { fg = "yellow", bg = "reset" }
marker_cut = { fg = "red", bg = "reset" }
marker_marked = { fg = "lightmagenta", bg = "reset" }
marker_selected = { fg = "magenta", bg = "reset" }

count_copied = { fg = "black", bg = "yellow" }
count_cut = { fg = "black", bg = "red" }
count_selected = { fg = "black", bg = "magenta" }

border_symbol = " " # Ōöé
border_style = { fg = "black" }

[tabs]

active = { fg = "gray", bg = "reset" }
inactive = { fg = "darkgray", bg = "reset" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]

normal_main = { fg = "black", bg = "gray" }
select_main = { fg = "black", bg = "lightmagenta" }
unset_main = { fg = "black", bg = "red" }

[indicator]

parent = { reversed = true }
current = { reversed = true }
preview = {}

padding = { open = "ŅéČ", close = "Ņé┤" } # Ō¢ł

[status]

overall = { fg = "gray" }

sep_left = { open = "", close = "" }
sep_right = { open = "ŅéČ", close = "Ņé┤" }

progress_label = { reverse = true }
progress_normal = { fg = "blue", bg = "reset" }
progress_error = { fg = "red", bg = "reset" }

perm_type = { fg = "cyan", bg = "reset" } # used only for dirs
perm_read = { fg = "gray", bg = "reset" }
perm_write = { fg = "gray", bg = "reset" }
perm_exec = { fg = "gray", bg = "reset" }
perm_sep = { fg = "darkgray", bg = "reset" }

[pick]

border = { fg = "darkgray" }
active = { fg = "reset" }
inactive = { fg = "gray" }

[input]

border = { fg = "darkgray" }
title = { fg = "darkgray" }
value = { fg = "reset" }
selected = { bg = "darkgray" }

[confirm]

border = { fg = "darkgray" }
title = { fg = "darkgray" }
body = { fg = "gray" }
list = { fg = "gray" }
btn_yes = { fg = "darkgray" }
btn_no = { fg = "darkgray" }
btn_labels = ["Yes", "No"]

[spot]

border = { fg = "darkgray" }
title = { fg = "darkgray" }
tbl_col = { fg = "reset" }
tbl_cell = { fg = "reset", reversed = true }

[cmp]

border = { fg = "darkgray" }
active = { fg = "reset" }
inactive = { fg = "gray" }

icon_file = "¾░łż"
icon_folder = "¾░Ø░"
icon_command = "’Æē"

[tasks]

border = { fg = "darkgray" }
title = { fg = "darkgray" }
hovered = { fg = "reset", bg = "darkgray" }

[which]

cols = 2
mask = { bg = "reset" }
cand = { fg = "magenta" }
rest = { fg = "darkgray" }
desc = { fg = "gray" }
separator = " "

[help]

on = { fg = "magenta", bg = "reset" }
run = { fg = "darkgray" }
desc = { fg = "gray" }
hovered = { bold = true }
footer = { fg = "gray", bg = "reset" }

[notify]

title_info = { fg = "green" }
title_warn = { fg = "yellow" }
title_error = { fg = "red" }

icon_info = "’üÜ"
icon_warn = "’ü▒"
icon_error = "’üŚ"

